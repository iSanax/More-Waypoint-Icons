<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Icon Translation Manager</title>
    <style>
        :root {
            --bg: #0f172a;
            --panel: #1e293b;
            --border: #334155;
            --text-main: #f1f5f9;
            --text-dim: #94a3b8;
            --accent: #38bdf8;
            --missing: #ef4444;
            --input-bg: #0f172a;
        }

        body { 
            font-family: 'Inter', system-ui, sans-serif; 
            background: var(--bg); 
            color: var(--text-main); 
            padding: 40px 20px;
            margin: 0;
        }

        .container { 
            max-width: 1200px; 
            margin: 0 auto; 
            background: var(--panel); 
            border-radius: 12px; 
            overflow: hidden;
            border: 1px solid var(--border);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .header-section {
            padding: 25px;
            background: rgba(255,255,255,0.02);
            border-bottom: 1px solid var(--border);
        }

        h1 { margin: 0 0 10px 0; font-size: 1.5rem; color: var(--accent); }

        .stats { font-size: 0.85rem; color: var(--text-dim); display: flex; gap: 20px; }

        .search-bar-area {
            padding: 20px 25px;
            background: rgba(0,0,0,0.1);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
        }

        .search-container { 
            width: 350px; 
            flex-shrink: 0;
            margin-right: 50px; /* ODSTĘP TUTAJ */
        }

        #searchInput, #filterStatus {
            width: 100%;
            padding: 10px 14px;
            background: var(--input-bg);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text-main);
            font-size: 0.85rem;
            outline: none;
            transition: border-color 0.2s;
        }

        #filterStatus { width: 220px; cursor: pointer; }

        #searchInput:focus, #filterStatus:focus { border-color: var(--accent); }

        table { width: 100%; border-collapse: collapse; }
        
        th { 
            background: rgba(0,0,0,0.2); 
            text-align: left; 
            padding: 15px; 
            border-bottom: 2px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .th-content { display: flex; flex-direction: column; gap: 5px; }
        .lang-name { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-dim); }
        .lang-perc { font-size: 0.8rem; color: var(--accent); font-weight: bold; }
        
        .progress-bar { width: 100%; height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--accent); }

        td { padding: 15px; border-bottom: 1px solid var(--border); vertical-align: middle; }

        .icon-info { display: flex; align-items: center; gap: 15px; }
        
        .icon-preview {
            width: 40px;
            height: 40px;
            background: #000;
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .icon-preview img { max-width: 100%; max-height: 100%; }

        .name-wrapper { display: flex; flex-direction: column; gap: 2px; }
        .file-name { font-weight: 600; font-size: 0.95rem; color: var(--text-main); }
        .translation-key { font-family: 'JetBrains Mono', monospace; font-size: 0.75rem; color: var(--accent); opacity: 0.8; }

        .translation-cell { font-size: 0.9rem; }
        .missing { color: var(--missing); font-size: 0.8rem; font-weight: bold; }

        tr:hover { background: rgba(255,255,255,0.03); }
        tr.hidden { display: none; }
    </style>
</head>
<body>

<div class="container">
    <div class="header-section">
        <h1>🚩 Waypoint Icons Explorer</h1>
        <div id="stats" class="stats">Wczytywanie...</div>
    </div>

    <div class="search-bar-area">
        <div class="search-container">
            <input type="text" id="searchInput" placeholder="Filtruj ikony...">
        </div>
        <div class="filter-container">
            <select id="filterStatus">
                <option value="all">Pokaż wszystkie</option>
                <option value="missing">Tylko nieuzupełnione</option>
            </select>
        </div>
    </div>

    <table id="mainTable" style="display:none;">
        <thead>
            <tr id="headerRow">
                <th style="width: 350px;"><div class="th-content"><span class="lang-name">Ikona i Klucz</span></div></th>
            </tr>
        </thead>
        <tbody id="tableBody"></tbody>
    </table>
</div>

<script>
    async function init() {
        const stats = document.getElementById('stats');
        const tbody = document.getElementById('tableBody');
        const headerRow = document.getElementById('headerRow');
        const searchInput = document.getElementById('searchInput');
        const filterStatus = document.getElementById('filterStatus');

        try {
            const mRes = await fetch('manifest.json');
            const manifest = await mRes.json();
            const iconCount = manifest.icons.length;

            const sortedLangs = ['en', ...manifest.langs.filter(l => l !== 'en')];
            const langData = {};
            const langStats = {};

            for (const lang of sortedLangs) {
                try {
                    const lRes = await fetch(`../More Waypoint Icons/assets/game/lang/${lang}.json`);
                    if (lRes.ok) {
                        langData[lang] = await lRes.json();
                        let translatedCount = 0;
                        manifest.icons.forEach(icon => {
                            const key = `game:wpSuggestion-${icon}`;
                            if (langData[lang][key]) translatedCount++;
                        });
                        const percentage = ((translatedCount / iconCount) * 100).toFixed(1);
                        langStats[lang] = { count: translatedCount, percent: percentage };
                    }
                } catch (e) {
                    langStats[lang] = { count: 0, percent: 0 };
                }
            }

            sortedLangs.forEach(lang => {
                const s = langStats[lang];
                const th = document.createElement('th');
                th.innerHTML = `
                    <div class="th-content">
                        <span class="lang-name">${lang}</span>
                        <span class="lang-perc">${s.percent}%</span>
                        <div class="progress-bar">
                            <div class="progress-fill" style="width: ${s.percent}%"></div>
                        </div>
                    </div>
                `;
                headerRow.appendChild(th);
            });

            manifest.icons.forEach(iconName => {
                const tr = document.createElement('tr');
                const translationKey = `game:wpSuggestion-${iconName}`;
                const iconPath = `../More Waypoint Icons/assets/mwi/textures/icons/worldmap/${iconName}.svg`;
                
                let rowHtml = `
                    <td class="icon-column">
                        <div class="icon-info">
                            <div class="icon-preview">
                                <img src="${iconPath}" alt="" onerror="this.parentElement.style.display='none'">
                            </div>
                            <div class="name-wrapper">
                                <span class="file-name">${iconName}</span>
                                <span class="translation-key">${translationKey}</span>
                            </div>
                        </div>
                    </td>
                `;

                let rowHasMissing = false;
                sortedLangs.forEach(lang => {
                    const isMissing = !(langData[lang] && langData[lang][translationKey]);
                    if (isMissing) rowHasMissing = true;

                    const val = isMissing ? '❌ BRAK' : langData[lang][translationKey];
                    rowHtml += `<td class="translation-cell ${isMissing ? 'missing' : ''}">${val}</td>`;
                });

                tr.innerHTML = rowHtml;
                if (rowHasMissing) tr.setAttribute('data-missing', 'true');
                tbody.appendChild(tr);
            });

            stats.innerHTML = `<span>Ikony: <b>${iconCount}</b></span> <span>Języki: <b>${sortedLangs.length}</b></span>`;
            document.getElementById('mainTable').style.display = 'table';

            const applyFilters = () => {
                const term = searchInput.value.toLowerCase();
                const onlyMissing = filterStatus.value === 'missing';
                const rows = tbody.getElementsByTagName('tr');

                for (const row of rows) {
                    const text = row.textContent.toLowerCase();
                    const isMissingRow = row.hasAttribute('data-missing');
                    const matchesSearch = text.includes(term);
                    const matchesStatus = !onlyMissing || isMissingRow;
                    row.classList.toggle('hidden', !(matchesSearch && matchesStatus));
                }
            };

            searchInput.addEventListener('input', applyFilters);
            filterStatus.addEventListener('change', applyFilters);

        } catch (err) {
            stats.innerHTML = `<span style="color:red">Błąd: ${err.message}</span>`;
        }
    }
    init();
</script>
</body>
</html>
