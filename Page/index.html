<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Icon Translation Manager</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <div class="header-section">
        <h1>Waypoint Icons Explorer</h1>
        <div id="stats" class="stats">Loading data...</div>
    </div>

    <div class="search-bar-area">
        <div class="search-container">
            <input type="text" id="searchInput" placeholder="Search icons or keys...">
        </div>
        <label class="filter-container">
            Show Only Missing
            <input type="checkbox" id="filterStatus">
        </label>
    </div>

    <div class="table-wrapper">
        <table id="mainTable" style="display:none;">
            <thead>
                <tr id="headerRow">
                    <th style="width: 380px;"><div class="th-content"><span class="lang-name">Icon Resource</span></div></th>
                </tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
