<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Icon Translation Manager</title>
    <style>
        :root {
            --bg: #121214;
            --panel: #1e1e21;
            --border: #333338;
            --text-main: #ffffff;   /* Czysta biel dla głównych napisów */
            --text-dim: #cbd5e1;    /* Jasny szary dla mniej ważnych tekstów */
            --accent: #ffffff;      /* Akcenty również białe */
            --missing: #f87171;
            --input-bg: #161618;
            --hover-row: #2a2a2e;
        }

        body { 
            font-family: 'Inter', system-ui, -apple-system, sans-serif; 
            background: var(--bg); 
            color: var(--text-main); 
            padding: 40px 20px;
            margin: 0;
            line-height: 1.5;
        }

        .container { 
            width: 95vw; 
            margin: 0 auto; 
            background: var(--panel); 
            border-radius: 12px; 
            border: 1px solid var(--border);
            box-shadow: 0 15px 40px rgba(0,0,0,0.4);
            display: flex;
            flex-direction: column;
            max-height: 90vh;
        }

        .header-section {
            padding: 20px 25px;
            background: rgba(255,255,255,0.03);
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }

        h1 { margin: 0 0 8px 0; font-size: 1.3rem; font-weight: 700; color: var(--text-main); }
        .stats { font-size: 0.85rem; color: var(--text-dim); display: flex; gap: 20px; }
        .stats b { color: var(--text-main); }

        .search-bar-area {
            padding: 15px 25px;
            background: rgba(0,0,0,0.2);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            flex-shrink: 0;
        }

        .search-container { 
            width: 350px; 
            flex-shrink: 0;
            margin-right: 30px; 
        }

        #searchInput, #filterStatus {
            width: 100%;
            padding: 10px 14px;
            background: var(--input-bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: #ffffff;
            font-size: 0.85rem;
            outline: none;
        }

        #searchInput::placeholder { color: #666; }

        #filterStatus { width: 220px; cursor: pointer; }

        .table-wrapper {
            overflow: auto;
            background: var(--panel);
        }

        table { 
            width: 100%; 
            border-collapse: collapse; 
            min-width: 1000px; 
        }
        
        th { 
            background: #242428; 
            text-align: left; 
            padding: 14px 18px; 
            border-bottom: 2px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .th-content { display: flex; flex-direction: column; gap: 6px; min-width: 130px; }
        .lang-name { font-size: 0.75rem; font-weight: 800; color: var(--text-main); letter-spacing: 0.05em; text-transform: uppercase; }
        .lang-perc { font-size: 0.85rem; color: var(--text-main); font-weight: 600; }
        
        .progress-bar { width: 100%; height: 4px; background: #333; border-radius: 2px; overflow: hidden; }
        .progress-fill { height: 100%; background: #ffffff; }

        td { padding: 12px 18px; border-bottom: 1px solid var(--border); vertical-align: middle; color: #ffffff; }

        .icon-info { display: flex; align-items: center; gap: 15px; min-width: 320px; }
        
        .icon-preview {
            width: 44px;
            height: 44px;
            background: #000;
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .name-wrapper { display: flex; flex-direction: column; gap: 2px; }
        .file-name { font-weight: 600; font-size: 0.95rem; color: #ffffff; }
        .translation-key { font-family: 'JetBrains Mono', monospace; font-size: 0.75rem; color: #94a3b8; }

        .translation-cell { font-size: 0.9rem; white-space: nowrap; }
        .missing { color: var(--missing); font-size: 0.75rem; font-weight: 700; }

        tr:hover { background: var(--hover-row); }
        tr.hidden { display: none; }

        /* Scrollbar */
        .table-wrapper::-webkit-scrollbar { width: 10px; height: 10px; }
        .table-wrapper::-webkit-scrollbar-track { background: var(--bg); }
        .table-wrapper::-webkit-scrollbar-thumb { background: #444; border-radius: 5px; }
        .table-wrapper::-webkit-scrollbar-thumb:hover { background: #666; }
    </style>
</head>
<body>

<div class="container">
    <div class="header-section">
        <h1>Waypoint Icons Explorer</h1>
        <div id="stats" class="stats">Loading data...</div>
    </div>

    <div class="search-bar-area">
        <div class="search-container">
            <input type="text" id="searchInput" placeholder="Search icons or keys...">
        </div>
        <div class="filter-container">
            <select id="filterStatus">
                <option value="all">Show All Icons</option>
                <option value="missing">Show Only Missing</option>
            </select>
        </div>
    </div>

    <div class="table-wrapper">
        <table id="mainTable" style="display:none;">
            <thead>
                <tr id="headerRow">
                    <th style="width: 380px;"><div class="th-content"><span class="lang-name">Icon Resource</span></div></th>
                </tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>
</div>

<script>
    async function init() {
        const stats = document.getElementById('stats');
        const tbody = document.getElementById('tableBody');
        const headerRow = document.getElementById('headerRow');
        const searchInput = document.getElementById('searchInput');
        const filterStatus = document.getElementById('filterStatus');

        try {
            const mRes = await fetch('manifest.json');
            const manifest = await mRes.json();
            const iconCount = manifest.icons.length;

            const sortedLangs = ['en', ...manifest.langs.filter(l => l !== 'en')];
            const langData = {};
            const langStats = {};

            for (const lang of sortedLangs) {
                try {
                    const lRes = await fetch(`../More Waypoint Icons/assets/game/lang/${lang}.json`);
                    if (lRes.ok) {
                        langData[lang] = await lRes.json();
                        let translatedCount = 0;
                        manifest.icons.forEach(icon => {
                            const key = `game:wpSuggestion-${icon}`;
                            if (langData[lang][key]) translatedCount++;
                        });
                        const percentage = ((translatedCount / iconCount) * 100).toFixed(1);
                        langStats[lang] = { count: translatedCount, percent: percentage };
                    }
                } catch (e) {
                    langStats[lang] = { count: 0, percent: 0 };
                }
            }

            sortedLangs.forEach(lang => {
                const s = langStats[lang] || { percent: 0 };
                const th = document.createElement('th');
                th.innerHTML = `
                    <div class="th-content">
                        <span class="lang-name">${lang}</span>
                        <span class="lang-perc">${s.percent}%</span>
                        <div class="progress-bar">
                            <div class="progress-fill" style="width: ${s.percent}%"></div>
                        </div>
                    </div>
                `;
                headerRow.appendChild(th);
            });

            manifest.icons.forEach(iconName => {
                const tr = document.createElement('tr');
                const translationKey = `game:wpSuggestion-${iconName}`;
                const iconPath = `../More Waypoint Icons/assets/mwi/textures/icons/worldmap/${iconName}.svg`;
                
                let rowHtml = `
                    <td class="icon-column">
                        <div class="icon-info">
                            <div class="icon-preview">
                                <img src="${iconPath}" alt="" width="32" height="32" onerror="this.parentElement.style.display='none'">
                            </div>
                            <div class="name-wrapper">
                                <span class="file-name">${iconName}</span>
                                <span class="translation-key">${translationKey}</span>
                            </div>
                        </div>
                    </td>
                `;

                let rowHasMissing = false;
                sortedLangs.forEach(lang => {
                    const isMissing = !(langData[lang] && langData[lang][translationKey]);
                    if (isMissing) rowHasMissing = true;

                    const val = isMissing ? '⚠️ MISSING' : langData[lang][translationKey];
                    rowHtml += `<td class="translation-cell ${isMissing ? 'missing' : ''}">${val}</td>`;
                });

                tr.innerHTML = rowHtml;
                if (rowHasMissing) tr.setAttribute('data-missing', 'true');
                tbody.appendChild(tr);
            });

            stats.innerHTML = `<span>Icons: <b>${iconCount}</b></span> <span>Languages: <b>${sortedLangs.length}</b></span>`;
            document.getElementById('mainTable').style.display = 'table';

            const applyFilters = () => {
                const term = searchInput.value.toLowerCase();
                const onlyMissing = filterStatus.value === 'missing';
                const rows = tbody.getElementsByTagName('tr');

                for (const row of rows) {
                    const text = row.textContent.toLowerCase();
                    const isMissingRow = row.hasAttribute('data-missing');
                    const matchesSearch = text.includes(term);
                    const matchesStatus = !onlyMissing || isMissingRow;
                    row.classList.toggle('hidden', !(matchesSearch && matchesStatus));
                }
            };

            searchInput.addEventListener('input', applyFilters);
            filterStatus.addEventListener('change', applyFilters);

        } catch (err) {
            stats.innerHTML = `<span style="color:var(--missing)">Error: ${err.message}</span>`;
        }
    }
    init();
</script>
</body>
</html>
